# Feature flags for the Streamlit application
#
# text_anonymization: Enable/disable sentence-level text anonymization interface
#                     (includes anonymize, translate, and summarize tasks)
#
# pdf_anonymization: Enable/disable PDF document anonymization interface
#                    (uses docling for text extraction and preserves layout)
#
# pdf_summarization: Enable/disable PDF document summarization interface
#                    (uses docling to convert PDF to markdown, then AI model to summarize)
#
# If all are false, the application will show a courtesy message.

features:
  text_anonymization: false
  pdf_anonymization: true
  pdf_summarization: true

# Presidio configuration for PII detection and anonymization
#
# spacy_model: The spaCy language model to use for Presidio NER
#              Options: en_core_web_sm (small, 12MB, faster, less accurate)
#                       en_core_web_md (medium, 40MB, balanced)
#                       en_core_web_lg (large, 380MB, slower, more accurate)
#                       en_core_web_trf (transformer, 440MB, most accurate, slowest)
#              Default: en_core_web_lg (recommended for production)

presidio:
  spacy_model: en_core_web_lg
